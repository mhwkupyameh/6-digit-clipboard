<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Clipboard - 6-Digit Codes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .code-display-large {
            font-size: 6em;
            font-weight: 800;
            background: linear-gradient(135deg, #ff6b6b, #feca57);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 20px 0;
            letter-spacing: 0.1em;
            text-shadow: 0 0 20px rgba(255,107,107,0.5);
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 1px solid #eee;
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }

        .tab-btn.active {
            background: white;
            color: #4facfe;
            border-bottom-color: #4facfe;
            font-weight: 600;
        }

        .tab-content {
            display: none;
            padding: 40px;
        }

        .tab-content.active {
            display: block;
        }

        .upload-area {
            border: 3px dashed #4facfe;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
            margin-bottom: 30px;
        }

        .upload-area:hover, .upload-area.dragover {
            background: #f0f8ff;
            border-color: #00f2fe;
        }

        .upload-icon {
            font-size: 4em;
            color: #4facfe;
            margin-bottom: 20px;
        }

        .file-input {
            display: none;
        }

        .preview-area {
            margin-top: 30px;
            min-height: 200px;
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 20px;
            background: #fafafa;
        }

        .preview-text {
            white-space: pre-wrap;
            font-family: monospace;
            max-height: 300px;
            overflow-y: auto;
        }

        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .code-area {
            width: 100%;
            height: 100px;
            font-family: monospace;
            font-size: 18px;
            padding: 20px;
            border: 3px solid #4facfe;
            border-radius: 15px;
            text-align: center;
            font-weight: 700;
            letter-spacing: 0.3em;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 10px 5px;
            box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            box-shadow: 0 5px 15px rgba(108, 117, 125, 0.3);
        }

        .btn-secondary:hover {
            box-shadow: 0 8px 25px rgba(108, 117, 125, 0.4);
        }

        .btn-group {
            text-align: center;
            margin: 30px 0;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            font-weight: 500;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .tab-content {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .code-display-large {
                font-size: 4em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 6-Digit Clipboard</h1>
            <p>Upload files → Get 6-digit code → Share anywhere!</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('upload')">📤 Upload</button>
            <button class="tab-btn" onclick="switchTab('retrieve')">📥 Retrieve</button>
        </div>

        <div id="upload-tab" class="tab-content active">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📁</div>
                <h3>Click or drag files here</h3>
                <p>Text, images, PDFs (up to 5MB) → Instant 6-digit code</p>
            </div>
            <input type="file" id="fileInput" class="file-input">

            <div id="previewArea" class="preview-area" style="display: none;"></div>
            
            <div class="btn-group">
                <button class="btn" onclick="generateCode()">🎯 Generate 6-Digit Code</button>
            </div>

            <div id="codeDisplay" style="display: none; text-align: center; padding: 30px;">
                <div class="code-display-large" id="shareCodeLarge"></div>
                <div id="shareCode"></div>
                <button class="btn" onclick="copyToClipboard()">📋 Copy Code</button>
                <button class="btn btn-secondary" onclick="clearUpload()">🗑️ Clear</button>
            </div>
        </div>

        <div id="retrieve-tab" class="tab-content">
            <h3>Enter your 6-digit code:</h3>
            <input class="code-area" id="retrieveCode" maxlength="6" placeholder="123456" />
            
            <div class="btn-group">
                <button class="btn" onclick="retrieveData()">🔍 Retrieve File</button>
                <button class="btn btn-secondary" onclick="clearRetrieve()">🗑️ Clear</button>
            </div>

            <div id="retrieveResult" style="display: none;"></div>
        </div>
    </div>

    <script>
        let currentFileData = null;
        const STORAGE_PREFIX = 'clip6_';

        // Generate random 6-digit code
        function generate6DigitCode() {
            return Math.floor(100000 + Math.random() * 900000).toString();
        }

        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'retrieve') {
                document.getElementById('retrieveCode').focus();
            }
        }

        // File upload handling
        document.getElementById('fileInput').addEventListener('change', handleFiles);
        const uploadArea = document.querySelector('.upload-area');
        uploadArea.addEventListener('dragover', handleDragOver);
        uploadArea.addEventListener('drop', handleDrop);
        uploadArea.addEventListener('dragleave', handleDragLeave);

        // Auto-format 6-digit input
        document.getElementById('retrieveCode').addEventListener('input', function(e) {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });

        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }

        function handleDragLeave(e) {
            e.currentTarget.classList.remove('dragover');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            const files = Array.from(e.dataTransfer.files);
            handleFiles({ target: { files } });
        }

        function handleFiles(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (file.size > 5 * 1024 * 1024) {
                showStatus('❌ File too large (max 5MB)', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                currentFileData = {
                    name: file.name,
                    type: file.type,
                    size: file.size,
                    data: e.target.result,
                    timestamp: Date.now()
                };
                showPreview(file, e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function showPreview(file, dataUrl) {
            const previewArea = document.getElementById('previewArea');
            previewArea.style.display = 'block';
            
            if (file.type.startsWith('image/')) {
                previewArea.innerHTML = `
                    <h4>📷 ${file.name} (${formatSize(file.size)})</h4>
                    <img src="${dataUrl}" class="preview-image" alt="Preview">
                `;
            } else if (file.type === 'text/plain' || file.name.match(/\.(txt|log|md)$/i)) {
                const text = dataUrl.split(',')[1];
                const decoded = atob(text);
                previewArea.innerHTML = `
                    <h4>📄 ${file.name} (${formatSize(file.size)})</h4>
                    <div class="preview-text">${decoded.substring(0, 1000)}${decoded.length > 1000 ? '...' : ''}</div>
                `;
            } else {
                previewArea.innerHTML = `
                    <h4>📎 ${file.name} (${formatSize(file.size)})</h4>
                    <p>✅ Ready for 6-digit code generation!</p>
                `;
            }
        }

        function formatSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function generateCode() {
            if (!currentFileData) {
                showStatus('📤 Please upload a file first', 'error');
                return;
            }

            // Generate unique 6-digit code (check for collision)
            let code;
            do {
                code = generate6DigitCode();
            } while (localStorage.getItem(STORAGE_PREFIX + code));

            // Store compressed data
            const storageData = JSON.stringify(currentFileData);
            localStorage.setItem(STORAGE_PREFIX + code, storageData);
            
            document.getElementById('shareCode').textContent = code;
            document.getElementById('shareCodeLarge').textContent = code;
            document.getElementById('codeDisplay').style.display = 'block';
            showStatus(`🎉 Your 6-digit code: ${code}`, 'success');
            
            // Auto-copy
            setTimeout(() => copyToClipboard(), 500);
        }

        function copyToClipboard() {
            const code = document.getElementById('shareCode').textContent;
            navigator.clipboard.writeText(code).then(() => {
                showStatus('📋 6-digit code copied!', 'success');
            }).catch(() => {
                showStatus('Failed to copy - please select and copy manually', 'error');
            });
        }

        function retrieveData() {
            const code = document.getElementById('retrieveCode').value.trim();
            if (code.length !== 6 || !/^\d{6}$/.test(code)) {
                showStatus('❌ Enter exactly 6 digits (000000-999999)', 'error');
                return;
            }

            const storageKey = STORAGE_PREFIX + code;
            const storedData = localStorage.getItem(storageKey);
            
            if (!storedData) {
                showStatus('❌ Code not found or expired', 'error');
                return;
            }

            try {
                const data = JSON.parse(storedData);
                const resultArea = document.getElementById('retrieveResult');
                resultArea.style.display = 'block';
                
                if (data.type.startsWith('image/')) {
                    resultArea.innerHTML = `
                        <div style="text-align: center;">
                            <h3>📷 ${data.name}</h3>
                            <img src="${data.data}" class="preview-image" style="max-height: 400px;">
                            <div class="btn-group">
                                <a href="${data.data}" download="${data.name}" class="btn">⬇️ Download Image</a>
                            </div>
                        </div>
                    `;
                } else {
                    resultArea.innerHTML = `
                        <div style="text-align: center;">
                            <h3>📎 ${data.name}</h3>
                            <p><strong>Size:</strong> ${formatSize(data.size)} | <strong>Uploaded:</strong> ${new Date(data.timestamp).toLocaleString()}</p>
                            <div class="btn-group">
                                <a href="${data.data}" download="${data.name}" class="btn">⬇️ Download File</a>
                            </div>
                        </div>
                    `;
                }
                
                showStatus(`✅ File retrieved with code ${code}!`, 'success');
            } catch (e) {
                showStatus('❌ Invalid data in code', 'error');
                localStorage.removeItem(storageKey);
            }
        }

        function showStatus(message, type) {
            const existingStatus = document.querySelector('.status');
            if (existingStatus) existingStatus.remove();
            
            const status = document.createElement('div');
            status.className = `status ${type}`;
            status.textContent = message;
            
            const container = document.querySelector('.container');
            container.appendChild(status);
            
            setTimeout(() => {
                if (status.parentNode) status.remove();
            }, 4000);
        }

        function clearUpload() {
            currentFileData = null;
            document.getElementById('fileInput').value = '';
            document.getElementById('previewArea').style.display = 'none';
            document.getElementById('codeDisplay').style.display = 'none';
        }

        function clearRetrieve() {
            document.getElementById('retrieveCode').value = '';
            document.getElementById('retrieveResult').style.display = 'none';
        }

        // Clean expired files (7 days)
        window.addEventListener('load', cleanupOldFiles);

        function cleanupOldFiles() {
            const now = Date.now();
            const sevenDays = 7 * 24 * 60 * 60 * 1000;
            
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key && key.startsWith(STORAGE_PREFIX)) {
                    try {
                        const data = JSON.parse(localStorage.getItem(key));
                        if (now - data.timestamp > sevenDays) {
                            localStorage.removeItem(key);
                        }
                    } catch (e) {
                        localStorage.removeItem(key);
                    }
                }
            }
        }
    </script>
</body>
</html>
